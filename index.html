<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Intro jQuery</title>
    <link
      href="https://fonts.googleapis.com/css?family=Permanent+Marker"
      rel="stylesheet">
      <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div class="container">
      <form id="my-form">
        <div class="form-row">
          <div class="col-6">
              <label for="input-name" class="sr-only">Name</label>
              <input type="text" class="form-control" id="input-name" placeholder="Nombre">
          </div>
          <div class="col-6">
            <label for="input-email" class="sr-only">Email</label>
            <input type="email" class="form-control" id="input-email" placeholder="Email">
          </div>
        </div>

        <div class="form-group">
          <label for="input-comments" class="sr-only">Comments</label>
           <textarea class="form-control" id="input-comments" rows="5"></textarea>
        </div>
        <button type="submit" class="btn btn-secondary btn-block" disabled>Enviar</button>
      </form>
    </div>
    
    <script src="js/jquery-3.4.0.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
